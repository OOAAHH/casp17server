server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    add_header X-Served-By "query-mailer-example" always;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __SERVER_NAME__;

    root __STATIC_ROOT__;
    index index.html;

    ssl_certificate __CERT_FULLCHAIN__;
    ssl_certificate_key __CERT_PRIVKEY__;
    include __TLS_OPTIONS_FILE__;
    ssl_dhparam __TLS_DHPARAM_FILE__;
    add_header X-Served-By "query-mailer-example" always;

    autoindex off;
    error_page 418 = @query_mailer;

    location = /submit {
        proxy_pass http://__APP_BIND_HOST__:__APP_PORT__;
        include /etc/nginx/proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Served-By "query-mailer-example" always;
    }

    location = / {
        if ($request_method = POST) {
            return 418;
        }
        if ($args != "") {
            return 418;
        }

        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Served-By "query-mailer-example" always;
    }

    location @query_mailer {
        proxy_pass http://__APP_BIND_HOST__:__APP_PORT__;
        include /etc/nginx/proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Served-By "query-mailer-example" always;
    }

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Served-By "query-mailer-example" always;
    }
}
